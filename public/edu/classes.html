<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gIVEMEEDU — Triedy</title>
  <link rel="stylesheet" href="/edu/css/edu.css">
</head>
<body>
  <nav class="edu-sidebar">
    <div class="edu-sidebar-brand"><h1>gIVEME</h1><span class="brand-badge">EDU</span></div>
    <ul class="edu-sidebar-nav">
      <li><a href="/edu/index.html"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
      <li><a href="/edu/classes.html" class="active"><span class="nav-icon">&#9733;</span> Triedy</a></li>
      <li><a href="/edu/gradebook.html"><span class="nav-icon">&#9998;</span> Klasifikacia</a></li>
      <li><a href="/edu/attendance.html"><span class="nav-icon">&#10003;</span> Dochadzka</a></li>
    </ul>
    <div class="edu-sidebar-footer"><a href="/index.html">&larr; gIVEMEGAME</a></div>
  </nav>

  <div class="edu-main">
    <header class="edu-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="edu-menu-toggle" onclick="EduApp.toggleSidebar()">&#9776;</button>
        <h2>Triedy</h2>
      </div>
      <div id="edu-topbar-user" class="edu-topbar-user"></div>
    </header>

    <main class="edu-content">
      <div id="alerts"></div>

      <div class="edu-card">
        <div class="edu-card-header">
          <h3>Zoznam tried</h3>
          <button class="edu-btn edu-btn-primary" id="btn-add-class" style="display:none"
            onclick="document.getElementById('create-class-form').style.display='block'">+ Nova trieda</button>
        </div>
        <div id="classes-list"><div class="edu-loading"><div class="edu-spinner"></div></div></div>
      </div>

      <!-- Create class form (admin only) -->
      <div id="create-class-form" class="edu-card" style="display:none">
        <h3>Nova trieda</h3>
        <div class="edu-form-group">
          <label>Nazov triedy *</label>
          <input type="text" id="new-class-name" class="edu-input" placeholder="5.A">
        </div>
        <div class="edu-form-group">
          <label>Rocnik</label>
          <input type="number" id="new-class-grade" class="edu-input" min="1" max="13" placeholder="5">
        </div>
        <div class="edu-form-group">
          <label>Skolsky rok *</label>
          <input type="text" id="new-class-year" class="edu-input" value="2025/2026">
        </div>
        <div style="display:flex;gap:8px">
          <button class="edu-btn edu-btn-primary" onclick="EduClasses.createClass()">Vytvorit</button>
          <button class="edu-btn edu-btn-secondary" onclick="document.getElementById('create-class-form').style.display='none'">Zrusit</button>
        </div>
      </div>

      <!-- Students modal -->
      <div id="students-modal" class="edu-modal-overlay" style="display:none" onclick="if(event.target===this)EduClasses.closeModal()">
        <div class="edu-modal">
          <h3 id="students-modal-title">Ziaci</h3>
          <div id="students-modal-body"></div>
          <div class="edu-modal-actions">
            <button class="edu-btn edu-btn-secondary" onclick="EduClasses.closeModal()">Zavriet</button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/edu/js/edu-auth.js"></script>
  <script src="/edu/js/edu-app.js"></script>
  <script src="/edu/js/edu-classes.js"></script>
  <script>
  (async function () {
    const profile = await EduApp.init();
    if (!profile || !EduApp.hasSchool()) {
      window.location.href = '/edu/index.html';
      return;
    }
    if (EduApp.getRole() === 'admin') {
      document.getElementById('btn-add-class').style.display = 'inline-flex';
    }
    await EduClasses.load();
  })();
  </script>
</body>
</html>
