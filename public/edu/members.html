<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gIVEMEEDU — Clenovia a role</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/edu/css/edu.css?v=2">
  <style>
    .role-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 2px;
      font-family: 'Press Start 2P', monospace;
      font-size: 6px;
      border: 2px solid #000;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .role-badge.admin    { background: #422006; color: #fcd34d; box-shadow: 2px 2px 0 #000; }
    .role-badge.teacher  { background: #1e3a5f; color: #93c5fd; box-shadow: 2px 2px 0 #000; }
    .role-badge.student  { background: #064e3b; color: #6ee7b7; box-shadow: 2px 2px 0 #000; }
    .role-badge.parent   { background: #3b0764; color: #e9d5ff; box-shadow: 2px 2px 0 #000; }

    .members-filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 8px 14px;
      border-radius: 2px;
      border: 2px solid #000;
      background: #0f0f24;
      color: #94a3b8;
      font-family: 'VT323', monospace;
      font-size: 18px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, box-shadow 0.15s;
      box-shadow: 3px 3px 0 #000;
    }
    .filter-btn.active, .filter-btn:hover {
      border-color: #000;
      color: #e9d5ff;
      background: #1e1b4b;
      box-shadow: 3px 3px 0 #000, 0 0 12px rgba(168,85,247,0.35);
    }
    .filter-btn.all.active  { color: #e2e8f0; background: #1e293b; }

    .member-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 2px solid rgba(45,45,107,0.5);
    }
    .member-row:last-child { border-bottom: none; }
    .member-avatar {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      object-fit: cover;
      background: #1e1b4b;
      border: 2px solid #000;
      box-shadow: 0 0 0 1px rgba(168,85,247,0.35);
      flex-shrink: 0;
    }
    .member-avatar-placeholder {
      width: 38px;
      height: 38px;
      border-radius: 4px;
      background: #1e1b4b;
      border: 2px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }
    .member-info { flex: 1; min-width: 0; }
    .member-name { font-family: 'VT323', monospace; font-weight: 600; font-size: 22px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e2e8f0; }
    .member-uid  { font-size: 16px; color: #94a3b8; font-family: 'VT323', monospace; }
    .member-actions { display: flex; gap: 6px; align-items: center; }

    .role-select {
      padding: 6px 10px;
      border-radius: 2px;
      border: 2px solid #000;
      background: #0f0f24;
      color: #e2e8f0;
      font-family: 'VT323', monospace;
      font-size: 18px;
      cursor: pointer;
    }
    .role-select:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-remove {
      padding: 6px 16px;
      border-radius: 2px;
      background: #450a0a;
      color: #fecaca;
      border: 2px solid #000;
      font-family: 'VT323', monospace;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 2px 2px 0 #000;
    }
    .btn-remove:hover { background: #7f1d1d; color: #fff; }

    .add-member-form {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
      margin-top: 4px;
    }
    .add-member-form .edu-form-group { margin-bottom: 0; flex: 1; min-width: 180px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }

    .stat-card {
      background: #0f0f24;
      border: 2px solid #000;
      border-radius: 4px;
      padding: 16px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(168,85,247,0.2), 4px 4px 0 #000;
    }
    .stat-number { font-family: 'Press Start 2P', monospace; font-size: 14px; font-weight: 400; line-height: 1.5; }
    .stat-label  { font-family: 'VT323', monospace; font-size: 16px; color: #94a3b8; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card.admin-card    .stat-number { color: #fcd34d; }
    .stat-card.teacher-card  .stat-number { color: #93c5fd; }
    .stat-card.student-card  .stat-number { color: #6ee7b7; }

    .empty-state { text-align: center; padding: 40px; color: #64748b; font-family: 'VT323', monospace; font-size: 22px; }
    .empty-state-icon { font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <nav class="edu-sidebar">
    <div class="edu-sidebar-brand"><h1>gIVEME</h1><span class="brand-badge">EDU</span></div>
    <ul class="edu-sidebar-nav">
      <li><a href="/edu/index.html"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
      <li><a href="/edu/classes.html"><span class="nav-icon">&#9733;</span> Triedy</a></li>
      <li><a href="/edu/gradebook.html"><span class="nav-icon">&#9998;</span> Klasifikacia</a></li>
      <li><a href="/edu/attendance.html"><span class="nav-icon">&#10003;</span> Dochadzka</a></li>
      <li><a href="/edu/members.html" class="active"><span class="nav-icon">&#128100;</span> Clenovia</a></li>
    </ul>
    <div class="edu-sidebar-footer"><a href="/index.html">&larr; gIVEMEGAME</a></div>
  </nav>

  <div class="edu-main">
    <header class="edu-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="edu-menu-toggle" onclick="EduApp.toggleSidebar()">&#9776;</button>
        <h2>Clenovia a role</h2>
      </div>
      <div id="edu-topbar-user" class="edu-topbar-user"></div>
    </header>

    <main class="edu-content">
      <div id="alerts"></div>

      <!-- Role stats -->
      <div class="stats-grid" id="stats-grid">
        <div class="stat-card admin-card">
          <div class="stat-number" id="count-admin">—</div>
          <div class="stat-label">Administratori</div>
        </div>
        <div class="stat-card teacher-card">
          <div class="stat-number" id="count-teacher">—</div>
          <div class="stat-label">Ucitelia</div>
        </div>
        <div class="stat-card student-card">
          <div class="stat-number" id="count-student">—</div>
          <div class="stat-label">Ziaci</div>
        </div>
      </div>

      <!-- Member list -->
      <div class="edu-card">
        <div class="edu-card-header">
          <h3>Zoznam clenov</h3>
          <button class="edu-btn edu-btn-primary" id="btn-show-add" style="display:none"
            onclick="EduMembers.toggleAddForm()">+ Pridat clena</button>
        </div>

        <!-- Add member form (admin only) -->
        <div id="add-member-form" style="display:none" class="edu-card" style="margin-bottom:16px">
          <h4 style="margin-bottom:12px">Pridat clena do skoly</h4>
          <div class="add-member-form">
            <div class="edu-form-group">
              <label>Email pouzivatela *</label>
              <input type="email" id="add-email" class="edu-input" placeholder="ucitel@skola.sk">
            </div>
            <div class="edu-form-group">
              <label>Rola *</label>
              <!-- Sprint 1 roles only. Parent deferred to Sprint 2. -->
              <select id="add-role" class="edu-input">
                <option value="teacher">Ucitel</option>
                <option value="student">Ziak</option>
                <option value="admin">Administrator</option>
              </select>
            </div>
            <div style="display:flex;gap:8px;padding-bottom:4px">
              <button class="edu-btn edu-btn-primary" onclick="EduMembers.addMember()">Pridat</button>
              <button class="edu-btn edu-btn-secondary" onclick="EduMembers.toggleAddForm()">Zrusit</button>
            </div>
          </div>
          <div id="add-alerts" style="margin-top:8px"></div>
        </div>

        <!-- Filters — Sprint 1 roles only. Parent deferred to Sprint 2. -->
        <div class="members-filters">
          <button class="filter-btn all active" onclick="EduMembers.filter('all', this)">Vsetci</button>
          <button class="filter-btn" onclick="EduMembers.filter('admin', this)">&#128081; Administratori</button>
          <button class="filter-btn" onclick="EduMembers.filter('teacher', this)">&#128203; Ucitelia</button>
          <button class="filter-btn" onclick="EduMembers.filter('student', this)">&#128218; Ziaci</button>
        </div>

        <div id="members-list"><div class="edu-loading"><div class="edu-spinner"></div></div></div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/edu/js/edu-auth.js"></script>
  <script src="/edu/js/edu-app.js"></script>
  <script src="/edu/js/edu-members.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await EduApp.init();
      await EduMembers.init();
    });
  </script>
</body>
</html>
