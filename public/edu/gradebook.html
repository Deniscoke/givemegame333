<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>gIVEMEEDU — Klasifikacia</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/edu/css/edu.css?v=2">
</head>
<body>
  <nav class="edu-sidebar">
    <div class="edu-sidebar-brand"><h1>gIVEME</h1><span class="brand-badge">EDU</span></div>
    <ul class="edu-sidebar-nav">
      <li><a href="/edu/index.html"><span class="nav-icon">&#9632;</span> Dashboard</a></li>
      <li><a href="/edu/classes.html"><span class="nav-icon">&#9733;</span> Triedy</a></li>
      <li><a href="/edu/gradebook.html" class="active"><span class="nav-icon">&#9998;</span> Klasifikacia</a></li>
      <li><a href="/edu/attendance.html"><span class="nav-icon">&#10003;</span> Dochadzka</a></li>
      <li><a href="/edu/members.html"><span class="nav-icon">&#128100;</span> Clenovia</a></li>
    </ul>
    <div class="edu-sidebar-footer"><a href="/index.html">&larr; gIVEMEGAME</a></div>
  </nav>

  <div class="edu-main">
    <header class="edu-topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="edu-menu-toggle" onclick="EduApp.toggleSidebar()">&#9776;</button>
        <h2>Klasifikacia</h2>
      </div>
      <div id="edu-topbar-user" class="edu-topbar-user"></div>
    </header>

    <main class="edu-content">
      <div id="alerts"></div>

      <!-- Selectors -->
      <div class="edu-card">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:end">
          <div class="edu-form-group" style="margin-bottom:0;flex:1;min-width:180px">
            <label>Trieda</label>
            <select id="gb-class" class="edu-select" onchange="EduGrades.loadGradebook()"></select>
          </div>
          <div class="edu-form-group" style="margin-bottom:0;flex:1;min-width:180px">
            <label>Predmet</label>
            <select id="gb-subject" class="edu-select" onchange="EduGrades.loadGradebook()"></select>
          </div>
          <button id="btn-add-item" class="edu-btn edu-btn-primary" style="display:none"
            onclick="document.getElementById('create-item-form').style.display='block'">+ Nove hodnotenie</button>
        </div>
      </div>

      <!-- Create grade item form -->
      <div id="create-item-form" class="edu-card" style="display:none">
        <h3>Nove hodnotenie</h3>
        <div class="edu-form-group">
          <label>Nazov *</label>
          <input type="text" id="gi-title" class="edu-input" placeholder="Test z rovnic">
        </div>
        <div style="display:flex;gap:12px">
          <div class="edu-form-group" style="flex:1">
            <label>Typ</label>
            <select id="gi-type" class="edu-select">
              <option value="test">Test</option>
              <option value="oral">Ustne</option>
              <option value="homework">DU</option>
              <option value="project">Projekt</option>
              <option value="other">Ine</option>
            </select>
          </div>
          <div class="edu-form-group" style="flex:1">
            <label>Vaha</label>
            <input type="number" id="gi-weight" class="edu-input" value="1" min="0.1" max="10" step="0.1">
          </div>
          <div class="edu-form-group" style="flex:1">
            <label>Predmet</label>
            <select id="gi-subject" class="edu-select"></select>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="edu-btn edu-btn-primary" onclick="EduGrades.createItem()">Vytvorit</button>
          <button class="edu-btn edu-btn-secondary" onclick="document.getElementById('create-item-form').style.display='none'">Zrusit</button>
        </div>
      </div>

      <!-- Gradebook table -->
      <div class="edu-card">
        <div id="gradebook-content">
          <div class="edu-empty"><div class="edu-empty-icon">&#128203;</div><p>Vyberte triedu pre zobrazenie klasifikacie</p></div>
        </div>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/edu/js/edu-auth.js"></script>
  <script src="/edu/js/edu-app.js"></script>
  <script src="/edu/js/edu-grades.js"></script>
  <script>
  (async function () {
    const profile = await EduApp.init();
    if (!profile || !EduApp.hasSchool()) {
      window.location.href = '/edu/index.html';
      return;
    }
    await EduGrades.init();
    if (EduApp.getRole() === 'teacher' || EduApp.getRole() === 'admin') {
      document.getElementById('btn-add-item').style.display = 'inline-flex';
      // Populate subject selector in create form
      const giSubject = document.getElementById('gi-subject');
      const subjects = (await EduAuth.apiFetch('/subjects')).subjects || [];
      giSubject.innerHTML = subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
    }
  })();
  </script>
</body>
</html>
